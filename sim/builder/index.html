<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYBRID</title>
    <link rel="icon" type="image/png" href="assets/logo_icon.png">
    <meta name="description" content="Staňte sa Hybridom, človekom so schopnosťami Somôr, a vyberte si svoju cestu. Zachránite zvyšky ľudstva alebo prispejete k jeho záhube?">  
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">    
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hybridrpg.sk/">
    <meta property="og:title" content="HYBRID">
    <meta property="og:description" content="Stolná hra na hrdinov (RPG) zasadená do post apokalyptického sveta po invázii Somôr, obrovského ľudožravého hmyzu. Staňte sa Hybridom, človekom so schopnosťami Somôr, a vyberte si svoju cestu. Zachránite zvyšky ľudstva alebo prispejete k jeho záhube?">
    <meta property="og:image" content="https://hybridrpg.sk/assets/og_image.jpg">
</head>
<body>


<div id="view-builder" class="view-section" style="display: block;">


    <div class="container">
        <div class="tabs">
            <div style="display: flex; align-items: flex-end; width: 100%; justify-content: flex-end;">
                <button id="close-builder" class="adrenaline-select" onclick="window.parent.toggleBuilder(false)" >
                    X
                </button>
            </div>
        </div>



        <div id="builder" class="tab-content active">
 
            <div class="stats-panel" id="character-stats"></div>
        </div>


    </div>
    </div>
    </div>
</div>

<div id="custom-modal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title" style="font-family:'Archivo Black'; margin-top:0;">UPOZORNENIE</h3>
        <p id="modal-message" style="font-size: 1.1rem; margin: 20px 0;">Tu sa zobrazí správa...</p>
        <div id="modal-buttons" class="modal-actions">
            </div>
    </div>


</div>



<div id="info-panel-container" style="z-index: 20000;">
    <div class="info-panel-box">
        <button class="info-panel-close-btn" onclick="toggleInfoOverlay(false)">×</button>
        <h3 style="font-family: 'Archivo Black', sans-serif; margin-top: 0;">UPRAVIŤ SCHOPNOSŤ</h3>
        <p style="font-family: 'Roboto Condensed', sans-serif;">Vyber si schopnosť a uprav jej úroveň alebo si pridaj novú.</p>

        <div class="info-panel">
            <div class="control-box">
                <h3 id="sel-skill-name" style="margin:0; font-family:'Archivo Black';">VYBERTE SCHOPNOSŤ</h3>
                <p id="sel-skill-cat" style="color:#888; font-size:0.8em; margin:5px 0;">KATEGÓRIA: -</p>
                <div id="sel-skill-rels" style="font-size:0.85em; color:#bbb; margin:10px 0; line-height:1.4;"></div>
                <div style="text-align:center; background:#111; padding:15px; margin-top:10px; border: 1px solid #333;">
                    <span id="cost-container" style="display:none;" class="old-price-wrapper">
                        <span id="cost-orig" class="old-price"></span>
                    </span>
                    <span id="cost-disc" style="font-size: 2rem; color: var(--hybrid-green); font-family:'Archivo Black';">0 BR</span>
                </div>
                <div id="skill-btn-container" style="display: flex; gap: 5px; margin-top: 15px;">
                    <button class="tab-btn" id="upgrade-btn" style="background:var(--hybrid-green); color:white; flex: 9; height: 50px; font-size: 1rem; clip-path:none; margin: 0;" onclick="upgradeSelected()">ZVÝŠIŤ ÚROVEŇ</button>
                    <button class="down-btn" title="Znížiť úroveň" style="background:var(--hybrid-red); color:white; flex: 0.8; height: 50px; font-size: 1.3rem; clip-path:none; margin: 0; display: flex; align-items: center; justify-content: center;" onclick="downgradeSkill()">↓</button>
                    <button class="back-btn" title="Zrušiť posledný krok" style="background:#444; color:white; flex: 0.8; height: 50px; font-size: 1.3rem; clip-path:none; margin: 0; display: flex; align-items: center; justify-content: center;" onclick="undoUpgrade()">⤺</button>

                </div>
            </div>
            <div>
                <div id="filter-container" style="display: flex; gap: 5px;">
                    <select id="builder-group-filter" style="border-radius: 8px;flex: 1; font-size: 0.8rem;" onchange="filterBuilder()"><option value="">VŠETKY SKUPINY</option></select>
                    <input type="text" id="builder-search" placeholder="ZADAJTE SCHOPNOSŤ" style="border-radius:8px;flex: 1.5; margin-right: 5px;" onkeyup="filterBuilder()">
                </div>
                <div class="selection-list" id="builder-list"></div>
            </div>
        </div>
    </div>
</div>

<script src="script_builder.js"></script>

    <script>
        // 1. GLOBÁLNE PREMENNÉ (Tieto tu nechaj, aby ich videli všetky funkcie)
        let skillsDB_new = {}; 
        let originalSkillsDB = {};
        let characters = (JSON.parse(localStorage.getItem('characters')) || [{ name: "HRDINA 1", sp: 40, skills: {}, isInitialPhase: true, humanity: 50 }])
            .map(char => ({
                ...char,
                isInitialPhase: char.isInitialPhase !== undefined ? char.isInitialPhase : true
            }));        
        let activeCharIdx = 0;
        let upgradeHistory = []; 
        let selectedSkill = null;
        let editingRels = [];

        // 2. SPUSTENIE (Logika samotného initu sa presúva do script.js)
        document.addEventListener('DOMContentLoaded', () => {
            init(); 
        });
    </script> 
</body>
</html>
