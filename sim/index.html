<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYBRID - Card Combat Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #949494; 
            --hybrid-black: #000000;
            --hybrid-red: #c62828;
            --hybrid-green: #2e7d32;
            --text-dark: #222222;
            --border-heavy: 3px solid #000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--bg-paper);
            color: var(--hybrid-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .spacing-top-4 {
            margin-top: 5em; 
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: 2.5rem;
            color: var(--hybrid-black);
            border-bottom: var(--border-heavy);
            margin-bottom: 20px;
            padding-bottom: 5px;
            letter-spacing: -1px;
            text-align: center;
            width: 100%;
            max-width: 1400px;
        }

        /* Balanced Split-Screen Grid Layout */
        .game-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            align-items: flex-start;
        }

        /* Left Column Profile (1/3 Width Asset Space) */
        .left-column {
            flex: 2;
            min-width: 320px;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Right Column Profile (2/3 Width Gaming Table) */
        .right-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Top row hosting scrollable logs and dynamic enemy stats */
        .right-top-row {
            display: flex;
            gap: 20px;
            width: 100%;
            align-items: flex-start;
        }

        /* --- Background Overlay Update --- */
        .gaming-table-floor {
            position: relative;
            overflow: hidden;
            background-color: rgba(91, 92, 55, 1); /* Keeps your native dark table floor color */
            border: 3px dashed rgba(255, 255, 255, 0.15); 
            border-radius: 6px;
            min-height: 400px;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            z-index: 1; 
        }

        /* Base state: Clean background image display without the dark tint */
        .gaming-table-floor::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-image);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            pointer-events: none;
            transition: background 0.3s ease;
        }

        /* Combat-only state: Applies the dark gradient overlay over the image */
        .gaming-table-floor.combat-mode::before {
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), var(--bg-image);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Stats Panels */
        .panel {
            background: #e0e0e0;
            border: var(--border-heavy);
            padding: 15px;
            box-shadow: 4px 4px 0px var(--hybrid-black);
        }

        .panel h3 {
            font-family: 'Archivo Black', sans-serif;
            border-bottom: 2px solid var(--hybrid-black);
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--hybrid-black);
            color: #fff;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Dynamically Controlled Top-Right Enemy UI Card */
        #enemy-panel {
            width: 300px;
            flex-shrink: 0;
            display: none; /* Controlled cleanly by system runtime toggles */
            position: relative;
            padding-bottom: 15px;
        }

        #enemy-sprite-container {
            position: absolute;
            right: 230px;          /* Aligns it to the right side of the gaming table */
            top: 50%;
            transform: translateY(-50%); /* Centers it vertically */
            z-index: 40;
            pointer-events: none; /* Prevents it from blocking card clicks */
        }

        #enemy-sprite {
            max-width: 250px;     /* Adjust size to fit your table proportions */
            height: auto;
            border-radius: 8px;   /* Matches your clean rounded corners look */
        }

        /* Enemy Card: Slide from Right to Left */
        .enemy-card-wrapper {
            position: absolute;
            top: 50%;
            right: -300px; /* Start off-screen right */
            transition: right 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .enemy-card-wrapper.show {
            right: 20px; /* Slide into view */
        }

        /* Player Card: Slide from Left */
        .player-card-slide {
            position: absolute;
            top: 40%;
            left: -300px;
            transition: left 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .player-card-slide.show {
            left: 20px;
        }

        .enemy-card-visual {
            width: 170px;
            height: 290px;
            position: relative;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.4s ease;
        }

        /* Rotates the selected side downwards (Attack is native bottom, Defend flips upside down) */
        .enemy-card-visual.rotate-A {
            transform: rotate(0deg);
        }
        .enemy-card-visual.rotate-D {
            transform: rotate(180deg);
        }

        /* Ready Box - Now anchored to the top-left */
        #ready-prompt {
            position: absolute;
            top: 120px;
            right: 260px;
            background: #fff;
            border: 6px solid var(--hybrid-red);
            padding: 10px;
            display: none; 
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            z-index: 200;
        }

        /* Console Output Layout Rules */
        .terminal {
            flex: 1;
            background: #ffffff;
            color: #000000;
            font-family: 'Archivo Black', Courier, monospace;
            padding: 15px;
            border: var(--border-heavy);
            height: 120px;
            overflow-y: auto;
            box-shadow: 4px 4px 0px var(--hybrid-black);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .terminal-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
        }

        .system-msg { color: #000000; font-weight: bold;}
        .success-msg { color: #5cd65c; font-weight: bold; }
        .failure-msg { color: #ff4d4d; font-weight: bold; }
        .danger-msg { color: #ffcc00; font-weight: bold; }

        /* Controls Section */
        .controls-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #d4d4d4;
            border: var(--border-heavy);
            padding: 12px 20px;
            box-shadow: 4px 4px 0px var(--hybrid-black);
        }

        .controls-panel label {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1rem;
        }

        .adrenaline-select {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 6px 12px;
            border: var(--border-heavy);
            background: #fff;
            cursor: pointer;
            outline: none;
        }
        .adrenaline-select:hover {
            transform: scale(1.05);
        }

        /* Localized Card Tray Containment (Left-Bounded) */
        .card-tray-wrapper {
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid var(--hybrid-black);
            padding: 5px 5px;
            box-shadow: 4px 4px 0px var(--hybrid-black);
            width: 100%;
        }

        .card-tray {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            width: 100%;
        }

        /* Card Elements */
        .card-container {
            position: relative;
            width: 111px;
            height: 184px;
            background: transparent; 
            overflow: hidden;        
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .card-tray .card-container:hover {
            transform: scale(1.5) translateY(-10px);
            z-index: 9999 !important;
        }

        .table-card {
            width: 170px; /* Adjust size for board visibility if needed */
            height: 290px;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }

        .rotate-player-D { transform: rotate(90deg); }
        .rotate-player-A { transform: rotate(-90deg); }
        .rotate-enemy-D { transform: rotate(-90deg); }
        .rotate-enemy-A { transform: rotate(90deg); }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-container.flipped {
            transform: rotate(180deg);
        }
        .card-container.flipped:hover {
            transform: scale(1.5) rotate(180deg) translateY(10px);
            z-index: 9999 !important;
        }
        .card-container.flipped .split-zone {
            transform: rotate(180deg);
        }

        /* Split interactive zones for Conflict Phase */
        .split-zone {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            color: white;
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px #000, -2px -2px 4px #000;
            transition: opacity 0.15s ease, background-color 0.15s ease;
            z-index: 10;
        }

        .split-zone.top { top: 0; }
        .split-zone.bottom { bottom: 0; }

        .conflict-mode .split-zone {
            opacity: 0.2;
            background-color: rgba(0, 0, 0, 0.3);
        }
        .conflict-mode .split-zone.top:hover {
            opacity: 1;
            background-color: rgba(46, 125, 50, 0.5);
        }
        .conflict-mode .split-zone.bottom:hover {
            opacity: 1;
            background-color: rgba(198, 40, 40, 0.5);
        }
        .enemy-stats-row {
            display: flex;
            gap: 20px; /* Puts comfortable breathing room between the two stat blocks */
        }

        .enemy-stats-row .stat-row {
            flex: 1; /* Makes both stats share the row width equally */
            margin-bottom: 0; /* Clears out the bottom margin since they are now side-by-side */
        }

        #enemy-sprite-container {
            position: absolute;
            right: 230px;          
            top: 50%;
            transform: translateY(-50%); 
            z-index: 40;
            pointer-events: none; 
            display: none;
        }

        /* Class triggered via JS when the enemy enters the field */
        .enemy-entrance {
            animation: enemySlideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Class triggered via JS when the enemy takes damage */
        .enemy-hit {
            animation: enemyShudder 0.4s ease-in-out;
        }

        @keyframes enemySlideIn {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(150px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0) scale(1);
            }
        }

        @keyframes enemyShudder {
            0%, 100% { transform: translateY(-50%) translateX(0); filter: brightness(1); }
            20% { transform: translateY(-50%) translateX(-15px) rotate(-3deg); filter: brightness(1.5) sepia(1) hue-rotate(-50deg); }
            40% { transform: translateY(-50%) translateX(12px) rotate(3deg); }
            60% { transform: translateY(-50%) translateX(-8px) rotate(-1deg); }
            80% { transform: translateY(-50%) translateX(5px) rotate(1deg); }
        }

        .track-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 4px;
            table-layout: fixed;
        }

        .track-header {
            font-family: 'Archivo Black', sans-serif;
            background: var(--hybrid-black);
            color: #fff;
            text-align: center;
            font-weight: bold;
            border: 2px solid var(--hybrid-black);
        }

        .track-cell {
            background: #fff;
            border: 2px solid var(--hybrid-black);
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            height: 32px;
            transition: all 0.15s ease;
            user-select: none;
        }

        /* Highlighted current stress value */
        .track-cell.active-stress {
            background: var(--hybrid-red) !important;
            color: #fff !important;
            transform: scale(1.1);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Keeps the trail of previous stress values red */
        .track-cell.filled-stress {
            background: var(--hybrid-red) !important;
            color: #fff !important;
        }

        /* Adrenaline Track Active Interaction Nodes */
        .track-cell.ad-playable {
            background: #f0f0f0;
            cursor: pointer;
            color: var(--hybrid-black);
        }
        .track-cell.ad-playable:hover {
            transform: scale(1.15);
            background: var(--hybrid-black);
            color: #fff;
            z-index: 10;
        }

        /* Highlight state when a player locks in an adrenaline level */
        .track-cell.ad-selected {
            background: var(--hybrid-green) !important;
            color: #fff !important;
            border-color: var(--hybrid-black);
        }

        /* Grayed out/Locked nodes */
        .track-cell.ad-locked {
            background: #b0b0b0 !important;
            color: #777 !important;
            cursor: not-allowed;
        }

        .dice-animation-pool {
            position: absolute;
            display: grid;
            grid-template-columns: repeat(3, 62px); /* Enforces exactly 3 columns */
            gap: 5px;
            justify-items: center;   /* Centers individual dice inside their grid cells */
            pointer-events: none;    /* Keeps table interaction layer click-through clear */
        }

        /* Player-Specific Track Layout (Bottom-Left Side) */
        .dice-animation-pool.player-pool {
            bottom: 20px;
            left: 20px;
            align-content: end;      /* Stacks grid rows upward from bottom */
            z-index: 5;
        }

        /* Enemy-Specific Track Layout (Top-Right Side Over Panel) */
        .dice-animation-pool.enemy-pool {
            top: 20px;
            right: 15px;             /* Perfectly maps over the 300px enemy panel */
            width: 270px;            /* Centers the columns within the panel column width */
            justify-content: center; 
            align-content: start;    /* Stacks grid rows downward from top */
            z-index: 100;            /* Forces dice to render ON TOP of cards and panels */
        }

        /* Base Die Frame Structure */
        .die-container {
            position: relative;
            width: 60px;
            height: 60px;
            opacity: 0;
            animation: slideUpRoll 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Enemy Custom Slide-Down Sequence Trigger Override */
        .die-container.enemy-die {
            animation: slideDownRoll 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .die-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.4));
        }

        .die-label {
            position: absolute;
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.2rem;
            color: #000000;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff;
            width: 100%;
            text-align: center;
        }

        /* --- Granular Custom Class Configuration Layout Options --- */
        .die-d4 {
            width: 55px; height: 55px;
        }
        .die-d4 .die-label {
            top: 30%; /* Adjusts label layout lower on triangular d4 assets */
            right: 5%;
            transform: rotate(13deg)
        }

        .die-d6 {
            width: 55px; height: 55px;
        }
        .die-d6 .die-label {
            top: 30%;
            right: 5%;
            transform: rotate(15deg)
        }

        .die-d8 {
            width: 58px; height: 58px;
        }
        .die-d8 .die-label {
            top: 28%;
            transform: rotate(-15deg)
        }

        .die-d10 {
            width: 60px; height: 60px;
        }
        .die-d10 .die-label {
            font-size: 1rem;
            top: 29%;
            transform: rotate(24deg)
        }

        .die-d12 {
            width: 62px; height: 62px;
        }
        .die-d12 .die-label {
            top: 30%;
            right: 2%;
            font-size: 1rem;
            transform: rotate(14deg)
        }

        /* Bonus Skill Die Frame rules */
        .die-dh {
            width: 50px; height: 50px;
        }

        /* Challenge Stat Display Overlay */
        .challenge-display {
            position: absolute;
            background: rgba(251, 255, 0, 0.6);
            border-radius: 58px;
            border: 6px solid var(--hybrid-black);
            top: 5px;
            left: 200px;
            display: flex;
            gap: 20px;
            padding: 5px 55px;
            z-index: 50;
            pointer-events: none; /* Allows clicking through to cards underneath */
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Archivo Black', sans-serif;
            font-size: 2.2rem;
            color: var(--hybrid-black);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        /* Threat Die styling */
        .die-dt {
            width: 50px; height: 50px;
        }
        .die-dt .die-label {
            top: 25%;
            font-size: 1.1rem;
        }

        /* Animation Keyframe translating up to roughly 1/3 of the field height and staying */
        @keyframes slideUpRoll {
            0% {
                transform: translateY(100px) rotate(-45deg);
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translateY(-180px) rotate(360deg); /* Halts at ~1/3 height up */
                opacity: 1; /* Keeps the dice fully visible on the board permanently */
            }
        }

        @keyframes slideDownRoll {
            0% {
                transform: translateY(-100px) rotate(45deg);
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translateY(250px) rotate(-360deg); /* Settles hovering overlay style */
                opacity: 1;
            }
        }

    </style>
</head>
<body>

    <div class="game-container">
        
        <div class="left-column">
            <div class="panel">
                <h3>PLAYER STATUS <span class="status-badge" id="player-turn-indicator">Your Turn</span></h3>
                <div class="stat-row"><span>Skill Level:</span><span id="player-skill">3</span></div>
                <div class="stat-row"><span>Weapon Power:</span><span id="player-weapon">1</span></div>
                <div class="stat-row"><span>Combat Advantage:</span><span id="player-advantage">0</span></div>
            </div>

            <div class="controls-panel">
                <input type="hidden" id="adrenaline-select" value="0">
                
                <table class="track-table">
                    <tr id="stress-track-row">
                        <td class="track-header">S:</td>
                        <td class="track-cell stress-node" data-val="1">1</td>
                        <td class="track-cell stress-node" data-val="2">2</td>
                        <td class="track-cell stress-node" data-val="3">3</td>
                        <td class="track-cell stress-node" data-val="4">4</td>
                        <td class="track-cell stress-node" data-val="5">5</td>
                        <td class="track-cell stress-node" data-val="6">6</td>
                        <td class="track-cell stress-node" data-val="7">7</td>
                        <td class="track-cell stress-node" data-val="8">8</td>
                        <td class="track-cell stress-node" data-val="9">9</td>
                        <td class="track-cell stress-node" data-val="10">10</td>
                    </tr>
                    <tr id="adrenaline-track-row">
                        <td class="track-header">A:</td>
                        <td class="track-cell ad-node" data-idx="1" data-val="1">1</td>
                        <td class="track-cell ad-node" data-idx="2" data-val="2">2</td>
                        <td class="track-cell ad-node" data-idx="3" data-val="3">3</td>
                        <td class="track-cell ad-node" data-idx="4" data-val="4">4</td>
                        <td class="track-cell ad-node" data-idx="5" data-val="3">3</td>
                        <td class="track-cell ad-node" data-idx="6" data-val="2">2</td>
                        <td class="track-cell ad-node" data-idx="7" data-val="1">1</td>
                        <td class="track-cell ad-node" data-idx="8" data-val="0">0</td>
                        <td class="track-cell ad-node" data-idx="9" data-val="0">0</td>
                        <td class="track-cell ad-node" data-idx="10" data-val="0">0</td>
                    </tr>
                </table>
            </div>

            <div class="card-tray-wrapper">
                <div class="card-tray" id="card-tray-container">
                    <div style="width:100%; display:flex; justify-content:center;">
                        <button id="flip-cards-btn" class="adrenaline-select" style="background: #000; color: #fff; width: 50px;">
                                ↻
                        </button>
                    </div>
                    <div class="card-container" data-card="O">
                        <div class="split-zone top" data-action="D">ČIN</div>
                        <div class="split-zone bottom" data-action="A">ÚTOK</div>
                        <img src="assets/O.png" alt="Card O" class="card-img" onerror="this.style.display='none'; this.parentElement.style.background='#c62828'; this.parentElement.innerHTML+='<div style=\'position:absolute;top:40%;width:100%;text-align:center;color:white;font-family:sans-serif;font-weight:bold;\'>O CARD</div>'">
                    </div>
                    <div class="card-container" data-card="R">
                        <div class="split-zone top" data-action="D">ČIN</div>
                        <div class="split-zone bottom" data-action="A">ÚTOK</div>
                        <img src="assets/R.png" alt="Card R" class="card-img" onerror="this.style.display='none'; this.parentElement.style.background='#2e7d32'; this.parentElement.innerHTML+='<div style=\'position:absolute;top:40%;width:100%;text-align:center;color:white;font-family:sans-serif;font-weight:bold;\'>R CARD</div>'">
                    </div>
                    <div class="card-container" data-card="S">
                        <div class="split-zone top" data-action="D">ČIN</div>
                        <div class="split-zone bottom" data-action="A">ÚTOK</div>
                        <img src="assets/S.png" alt="Card S" class="card-img" onerror="this.style.display='none'; this.parentElement.style.background='#e65100'; this.parentElement.innerHTML+='<div style=\'position:absolute;top:40%;width:100%;text-align:center;color:white;font-family:sans-serif;font-weight:bold;\'>S CARD</div>'">
                    </div>
                    <div class="card-container" data-card="B">
                        <div class="split-zone top" data-action="D">ČIN</div>
                        <div class="split-zone bottom" data-action="A">ÚTOK</div>
                        <img src="assets/B.png" alt="Card B" class="card-img" onerror="this.style.display='none'; this.parentElement.style.background='#1565c0'; this.parentElement.innerHTML+='<div style=\'position:absolute;top:40%;width:100%;text-align:center;color:white;font-family:sans-serif;font-weight:bold;\'>B CARD</div>'">
                    </div>

                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="right-top-row">
                <div class="terminal" id="terminal-screen"></div>      

            </div>
            
            <div class="gaming-table-floor">
                <div id="enemy-sprite-container" style="display: none;">
                    <img id="enemy-sprite" src="" alt="Enemy Encounter" />
                </div>
                <div id="challenge-stats-display" class="challenge-display" style="display: none;"></div>
                <div id="player-card-display" class="player-card-slide"></div>
                    <div id="ready-prompt">
                        <div style="font-family:'Archivo Black';">Môžeme pokračovať?</div>
                        <button id="ready-btn" class="adrenaline-select" style="width: 50px; background: var(--hybrid-green);">✓</button>
                    </div>
                <div class="panel" id="enemy-panel">
                    <h3><span id="enemy-heading-type">ENEMY</span> </h3>
                    <div class="enemy-stats-row">
                        <div class="stat-row"><span>Stress:</span><span id="enemy-stress">0 / 5</span></div>
                        <div class="stat-row"><span>Advantage:</span><span id="enemy-advantage">0</span></div>
                    </div>
                    
                    <div class="enemy-card-wrapper" id="enemy-card-container"></div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        const CARDS = {
            "O": [[3, [10]], [1, [10, 4]]],
            "R": [[1, [12]], [2, [12]]],
            "S": [[0, [10, 4]], [3, [10]]],
            "B": [[-1, [10, 6]], [4, [8]]],
        };

        const HERO = {
            "skills": { "climb": 3, "scout": 1 }, // Added example alternative skill for testing
            "stress_thresh": 8,
            "weapon": 1
        };

        const ENEMY_TYPES = {
            "SCOUT": {
                "skill": 2,
                "stress_thresh": 5,
                "weapon": 1,
                "image": "assets/SCOUT.png"
            }
        };

        const CHALLENGES = {
            "GAME_OVER": {
                "skills": ["climb"],
                "image": "assets/GAME_OVER.png",
                "initial_msg": "Koniec hry! Chceš hrať ešte raz?",
                "choice_A": "Áno!",
                "choice_B": "Nie.",
                "case_A": "CAR",
                "case_B": "GAME_OVER",
            },
            "WRECKS": {
                "skills": ["suck"],
                "difficulty": 6,
                "threat": 5,
                "image": "assets/WRECKS.png",
                "initial_msg": "Objavíš niekoľko vrakov áut. Možno v niektorom budú zvyšky benzínu. Skús ho vysať.",
                "success_msg": "Vyšlo to, máš benzín.",
                "threat_msg": "Vdýchneš benzín a začneš kašľať.",
                "threat_avoided_msg": "Zacítiš si výpary a prestaneš ťahať v poslednej chvíli. Skoro sa ti benzín dostal do úst.",
                "failure_msg": "Nepodarilo sa ti to. Buď tam nič nie je, alebo to jednoducho nevieš.",
                "case_success": "GAME_OVER",
                "case_threat": "stress+2",
                "case_failure": "WRECKS"
            },
            "SNEAK": {
                "skills": ["sneak"],
                "difficulty": 8,
                "threat": 3,
                "image": "assets/SNEAK.png",
                "initial_msg": "Snažíš sa prekĺznuť. Zdá sa, že zatiaľ si ťa nevšimla. (vyber si kartu)",
                "success_msg": "Úspech! Skautka si ťa nevšimla a môžeš ísť ďalej.",
                "threat_msg": "Pozeráš na Skautku, nevšimneš si plot pod nohami a poškriabeš sa na ňom.",
                "threat_avoided_msg": "Takmer sa poškriabeš na plote. Ale keďže si dávaš pozor, nič sa ti nestane.",
                "failure_msg": "Všimla si ťa a rozbehla sa za tebou!",
                "case_success": "WRECKS",
                "case_threat": "stress+1",
                "case_failure": ["SCOUT", "WRECKS"]
            },
            "CAR": {
                "skills": ["climb"],
                "image": "assets/CAR.png",
                "initial_msg": "Po ceste do pevnosti sa ti minul benzín. Možno nejaký nájdeš v neďalekom meste. Medzi tebou a mestom sa ale motá skautka. Čo urobíš?",
                "choice_A": "Zaútočiť na skautku.",
                "choice_B": "Pokúsiť sa ju nenápadne obísť.",
                "case_A": ["SCOUT", "WRECKS"],
                "case_B": "SNEAK",
            },
            "WALL": {
                "skills": ["climb"],
                "difficulty": 8,
                "threat": 4,
                "image": "assets/WALL.png",
                "initial_msg": "A towering concrete security wall looms over the yard. You must scale it.",
                "success_msg": "💪 Success! You scale the wall flawlessly, slipping over the parapet.",
                "threat_msg": "⚠️ Spotted! A spotlight sweeps over your position and alarms echo!",
                "failure_msg": "❌ Failure! You lose your grip and slide roughly back down the concrete surface.",
                "case_success": "FORT",
                "case_threat": "SCOUT",
                "case_failure": "WALL"
            },
            "FORT": {
                "skills": ["scout", "climb"], // Example with multiple eligible skills
                "difficulty": 9,
                "threat": 3,
                "image": "assets/FORT.jpeg",
                "initial_msg": "You approach the outpost bunker complex. Defensive coverage looks tight.",
                "success_msg": "💪 Success! You bypass the electronic lock gates undetected.",
                "threat_msg": "⚠️ Ambush! Guard details patrol right around the corner!",
                "failure_msg": "❌ Failure! You trigger a proximity perimeter tripwire network.",
                "case_success": "FORT", 
                "case_threat": "SCOUT",
                "case_failure": "FORT"
            },
        };

        // --- Core Engine Architecture Variables ---
        let current_challenge_key = "CAR"; // Dictates our starting node context
        let pending_challenge_key = null;   // Caches the upcoming challenge target during threat loops
        let enemy = null;
        let enemy_stress = 0;
        let enemy_escaping = false;
        let turn = "p";
        let round = 0;
        let move = 0;
        let weapon = 1;
        let stress = 0;
        const stress_thresh = 8;
        let skill = 3;
        let advantage = 0;
        let enemy_advantage = 0;
        let cards_are_flipped = false; 
        
        let player_action = null; 
        let enemy_action = null;  
        
        let is_conflict = false; 
        let current_challenge = { difficulty: 7, threat: 2 };
        let inputs_frozen = false;
        let combat_starter = null;

        function log(message, className = "", extraSpacing = false) {
            const terminal = document.getElementById("terminal-screen");
            const line = document.createElement("div");
            
            // Append the spacing class if extraSpacing is true
            line.className = `terminal-line ${className} ${extraSpacing ? 'spacing-top-4' : ''}`.trim();
            line.innerText = message;
            
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }


        function resetAdrenalineSelection() {
            document.getElementById("adrenaline-select").value = "0";
            document.querySelectorAll(".ad-node").forEach(node => node.classList.remove("ad-selected"));
        }
        
        function rollDice(cardCode, attack = false, skillLevel = 0, isEnemy = false) {
            if (!(cardCode in CARDS)) {
                log("Invalid card code error!", "danger-msg", true);
                return 0;
            }
            
            let side = attack ? 1 : 0;
            let total_roll = 0;
            let dice_list = CARDS[cardCode][side][1];
            let rollsData = []; 
                        
            dice_list.forEach(d => {
                let r = Math.floor(Math.random() * d) + 1;
                total_roll += r;
                //log(`  D${d}: ${r}`);
                rollsData.push({ type: `D${d}`, value: r, isSkillDie: false });
            });
            
            for (let i = 0; i < skillLevel; i++) {
                let r = Math.floor(Math.random() * 2); 
                total_roll += r;
                //log(`  DH: ${r}`);
                rollsData.push({ type: 'DH', value: r, isSkillDie: true });
            }
            
            // Forward identity check state down to display pipeline layer
            triggerDiceVisualAnimation(rollsData, isEnemy);
            
            return total_roll;
        }

        function handleChallengeTransition(caseTarget) {
            if (!caseTarget) return;

            let actualTarget = caseTarget;
            
            // --- NOVÉ: Kontrola, či cieľ obsahuje aj nasledujúcu udalosť ---
            if (Array.isArray(caseTarget)) {
                actualTarget = caseTarget[0];
                pending_challenge_key = caseTarget[1]; // Uložíme "WRECKS" pre neskoršie použitie
            } else {
                // Ak prechádzame na bežného nepriateľa bez definovanej následnosti, vyčistíme premennú
                if (actualTarget in ENEMY_TYPES) {
                    pending_challenge_key = null;
                }
            }

            // 1. If target dictates an explicit Enemy Combat deployment
            if (actualTarget in ENEMY_TYPES) { 
                                // Freeze the UI immediately so the player can read
                inputs_frozen = true;
                updateUI();

                setTimeout(() => {
                log(`\n⚔️ Priprav sa na boj! Proti tebe stojí: ${actualTarget}`, "danger-msg", true);
                

                    enemy = actualTarget; 
                    enemy_stress = 0;
                    enemy_escaping = false;
                    is_conflict = true;
                    move = 0;
                    combat_starter = null;
                    inputs_frozen = false;

                    // --- Display Enemy Image ---
                    const enemyContainer = document.getElementById("enemy-sprite-container");
                    const enemyImg = document.getElementById("enemy-sprite");
                    if (enemyContainer && enemyImg && ENEMY_TYPES[actualTarget].image) { 
                        enemyImg.src = ENEMY_TYPES[actualTarget].image; 
                        enemyContainer.style.display = "block"; 
                        
                        // Remove old classes and force animation reflow
                        enemyContainer.classList.remove("enemy-entrance", "enemy-hit");
                        void enemyContainer.offsetWidth; 
                        enemyContainer.classList.add("enemy-entrance");
                    }
                    // ---------------------------------

                    gameloop(false);
                }, 4000); // 4-second reading delay
                return;
            }

            // 2. If target moves the user forward to another challenge map node
            if (actualTarget in CHALLENGES) { // <-- Zmenené z caseTarget na actualTarget
                current_challenge_key = actualTarget; // <-- Zmenené z caseTarget na actualTarget
                runActionPhase(); // Sets up backgrounds, UI, and logs
                
                const activeChallenge = CHALLENGES[caseTarget];
                
                // --- NEW: Detect Narrative Decision Nodes ---
                if (activeChallenge.choice_A && activeChallenge.choice_B) {
                    inputs_frozen = true; // Freeze card tray interactions
                    document.getElementById("player-turn-indicator").innerText = "VYBER SI MOŽNOSŤ";
                    
                    // Check if our dynamic choice UI already exists, otherwise build it
                    let choicePrompt = document.getElementById("choice-prompt");
                    if (!choicePrompt) {
                        choicePrompt = document.createElement("div");
                        choicePrompt.id = "choice-prompt";
                        // Styled to seamlessly match the current hybrid visual language
                        choicePrompt.style.cssText = `
                            position: absolute;
                            top: 70%;
                            right: 5%;
                            padding: 20px;
                            display: wrap;
                            flex-direction: row;
                            align-items: center;
                            gap: 12px;
                            z-index: 200;
                            width: 100%;
                            max-width: 650px;
                        `;
                        document.querySelector(".gaming-table-floor").appendChild(choicePrompt);
                    }

                    // Populate the UI with the active node's parameters
                    choicePrompt.innerHTML = `
                        <button id="btn-choice-A" class="adrenaline-select" style="width: 100%; white-space: normal; padding: 12px; height: auto;">${activeChallenge.choice_A}</button>
                        <button id="btn-choice-B" class="adrenaline-select" style="width: 100%; white-space: normal; padding: 12px; height: auto;">${activeChallenge.choice_B}</button>
                    `;
                    choicePrompt.style.display = "flex";

                    // Map button clicks to clear the prompt and route logic forward
                    document.getElementById("btn-choice-A").onclick = () => {
                        choicePrompt.style.display = "none";
                        handleChallengeTransition(activeChallenge.case_A);
                    };
                    
                    document.getElementById("btn-choice-B").onclick = () => {
                        choicePrompt.style.display = "none";
                        handleChallengeTransition(activeChallenge.case_B);
                    };
                }
                return;
            }

            // 3. If target string contains stress modifications (e.g. "stress+2")
            if (typeof caseTarget === 'string' && caseTarget.toLowerCase().includes("stress")) {
                let parts = caseTarget.split("+");
                let amount = parts[1] ? parseInt(parts[1]) : 1;
                stress += amount;
                log(`Stúpol ti stres o ${amount}!`, "danger-msg");
                updateUI();
                
                if (stress > stress_thresh) {
                    log("💀 Stres presiahol hodnotu kolapsu. KONIEC HRY.", "failure-msg", true);
                    inputs_frozen = true;
                }
                return;
            }

            log(`Warning: Unhandled routing instruction case reference '${caseTarget}'`, "danger-msg", true);
        }

        function triggerDiceVisualAnimation(diceRolls, isEnemy = false) {
            const tableFloor = document.querySelector('.gaming-table-floor');
            if (!tableFloor) return;

            // Target the specific sandboxed track pool type so actor nodes do not conflict
            const poolClass = isEnemy ? 'enemy-pool' : 'player-pool';
            const oldPool = tableFloor.querySelector(`.dice-animation-pool.${poolClass}`);
            if (oldPool) oldPool.remove();

            // Create a new sandbox layer container bound inside the floor space
            const pool = document.createElement('div');
            pool.className = `dice-animation-pool ${poolClass}`;
            tableFloor.appendChild(pool);

            diceRolls.forEach((die, index) => {
                const container = document.createElement('div');
                
                // Track visual custom animation behavior profile configurations
                const modifierAnimationClass = isEnemy ? ' enemy-die' : '';
                
                if (die.isSkillDie) {
                    container.className = `die-container die-dh${modifierAnimationClass}`;
                    container.style.animationDelay = `${index * 0.1}s`; 
                    
                    const img = document.createElement('img');
                    img.src = `assets/DH${die.value}.png`;
                    img.className = 'die-img';
                    img.alt = `Skill Die ${die.value}`;
                    
                    container.appendChild(img);
                } else {
                    const classType = die.type.toLowerCase(); 
                    container.className = `die-container die-${classType}${modifierAnimationClass}`;
                    container.style.animationDelay = `${index * 0.1}s`;
                    
                    const img = document.createElement('img');
                    img.src = `assets/${die.type}.png`;
                    img.className = 'die-img';
                    img.alt = die.type;
                    
                    const label = document.createElement('div');
                    label.className = 'die-label';
                    label.innerText = die.value;
                    
                    container.appendChild(img);
                    container.appendChild(label);
                }
                
                pool.appendChild(container);
            });
        }

        function runActionPhase() {
            enemy = null;
            is_conflict = false;
            player_action = null;
            enemy_action = null;
            move = 0;
            hidecards(player = true);

            const enemyContainer = document.getElementById("enemy-sprite-container");
            if (enemyContainer) {
                enemyContainer.style.display = "none";
                enemyContainer.classList.remove("enemy-entrance", "enemy-hit");
            }

            const tableFloor = document.querySelector('.gaming-table-floor');
            if (tableFloor) {
                const enemyPool = tableFloor.querySelector('.dice-animation-pool.enemy-pool');
                if (enemyPool) enemyPool.remove();
            }

            const activeChallenge = CHALLENGES[current_challenge_key];
            current_challenge.difficulty = activeChallenge.difficulty;
            current_challenge.threat = activeChallenge.threat;

            // --- UPDATED: Pass image asset straight to the CSS variable ---
            if (tableFloor) {
                if (activeChallenge.image) {
                    // Feeds the dynamic image straight into our dark tinted layer engine
                    tableFloor.style.setProperty('--bg-image', `url('${activeChallenge.image}')`);
                } else {
                    // Safely strips the overlay out entirely if no asset exists
                    tableFloor.style.removeProperty('--bg-image');
                }
            }
            // -------------------------------------------------------------

            let highestSkillValueFound = 0;
            if (activeChallenge.skills && activeChallenge.skills.length > 0) {
                activeChallenge.skills.forEach(s => {
                    let characterSkillLevel = HERO.skills[s] || 0;
                    if (characterSkillLevel > highestSkillValueFound) {
                        highestSkillValueFound = characterSkillLevel;
                    }
                });
            }
            skill = highestSkillValueFound;
            document.getElementById("player-skill").innerText = skill;
            
            const challengeDisplay = document.getElementById("challenge-stats-display");
            if (challengeDisplay) {
                if (activeChallenge.difficulty !== undefined && activeChallenge.threat !== undefined) {
                    challengeDisplay.style.display = "flex";
                    challengeDisplay.innerHTML = `
                        <div class="stat-item"><img src="assets/DIFFICULTY.png" class="stat-icon"> <span>${current_challenge.difficulty}</span></div>
                        <div class="stat-item"><img src="assets/THREAT.png" class="stat-icon"> <span>${current_challenge.threat}</span></div>
                    `;
                } else {
                    challengeDisplay.style.display = "none";
                }
            }

            if (activeChallenge.initial_msg) {
                log(activeChallenge.initial_msg, "system-msg", true);
            } else {
                log(`${current_challenge_key}`, "system-msg");
            }
            
            // --- UPDATED: Conditionally log difficulty and threat to the terminal ---
            if (activeChallenge.difficulty !== undefined && activeChallenge.threat !== undefined) {
                log(`NÁROČNOSŤ: ${current_challenge.difficulty}  |  HROZBA: ${current_challenge.threat}`);
            }
            
            inputs_frozen = false;
            updateUI();
        }

        function updateUI() {
            document.getElementById("player-advantage").innerText = advantage;
            
            const tray = document.getElementById("card-tray-container");
            const enemyHeading = document.getElementById("enemy-heading-type");
            const challengeDisplay = document.getElementById("challenge-stats-display");
            const tableFloor = document.querySelector('.gaming-table-floor'); // Target the table floor

            // Stress, Adrenaline //
            document.querySelectorAll(".track-cell").forEach(cell => {
                cell.classList.remove("active-stress", "filled-stress", "ad-playable", "ad-locked");
            });

            // Loop through all stress nodes and color them based on current stress
            document.querySelectorAll(".stress-node").forEach(cell => {
                const val = parseInt(cell.getAttribute("data-val"));
                if (val <= stress) {
                    if (val === stress) {
                        cell.classList.add("active-stress"); // The leading edge (pops out)
                    } else {
                        cell.classList.add("filled-stress"); // The trailing edge (stays red)
                    }
                }
            });

            document.querySelectorAll(".ad-node").forEach(cell => {
                const idx = parseInt(cell.getAttribute("data-idx"));
                if (idx > stress) {
                    cell.classList.add("ad-playable");
                } else {
                    cell.classList.add("ad-locked");
                }
            });

            // Clean Display-Driven Enemy Render States
            if (enemy === null) {
                is_conflict = false;
                document.getElementById("enemy-panel").style.display = "none";
                tray.className = "card-tray challenge-mode";
                
                // Remove the dark tint overlay during normal challenges
                if (tableFloor) tableFloor.classList.remove("combat-mode");
                
                // Show challenge stats when not in conflict
                if (challengeDisplay) {
                    const activeChallenge = CHALLENGES[current_challenge_key];
                    if (activeChallenge && activeChallenge.difficulty !== undefined && activeChallenge.threat !== undefined) {
                        challengeDisplay.style.display = "flex";
                    } else {
                        challengeDisplay.style.display = "none";
                    }
                }
                
                if (enemyHeading) enemyHeading.innerText = "ENEMY";
            } else {
                is_conflict = true;
                document.getElementById("enemy-panel").style.display = "block";
                document.getElementById("enemy-stress").innerText = `${enemy_stress} / ${ENEMY_TYPES[enemy].stress_thresh}`;
                document.getElementById("enemy-advantage").innerText = enemy_advantage;
                tray.className = "card-tray conflict-mode";
                
                // Add the dark tint overlay during combat encounters
                if (tableFloor) tableFloor.classList.add("combat-mode");
                
                // Hide challenge stats during conflict
                if (challengeDisplay) challengeDisplay.style.display = "none";
                
                if (enemyHeading) enemyHeading.innerText = enemy;
            }

            if (inputs_frozen) {
                document.getElementById("player-turn-indicator").innerText = "ČAKAJ...";
            } else if (!is_conflict) {
                document.getElementById("player-turn-indicator").innerText = "VYBER SI KARTU";
            } else {
                if (turn === "p") {
                    document.getElementById("player-turn-indicator").innerText = "IDEŠ";
                } else {
                    document.getElementById("player-turn-indicator").innerText = "Waiting";
                }
            }
        }

        function resolveActionPhase(card) {
            inputs_frozen = true;
            updateUI();

            const activeChallenge = CHALLENGES[current_challenge_key];
            let adrenaline = parseInt(document.getElementById("adrenaline-select").value) || 0;
            let roll_result = rollDice(card, false, skill);
            roll_result += adrenaline; 
            
            log(`Celkový výsledok: ${roll_result} (Zahŕňa +${adrenaline} za adrenalín)`, "", true);

            let success = roll_result >= current_challenge.difficulty;
            let is_tie_or_failure = roll_result <= current_challenge.difficulty;
            let threat_realized = false;

            // 1. Log baseline success or failure text
            if (success) {
                log(activeChallenge.success_msg || "💪 Úspech!", "success-msg");
            } else {
                log(activeChallenge.failure_msg || "❌ Zlyhanie!", "failure-msg");
            }

            // 2. Core Fix: Threat is ONLY rolled/evaluated in case of a tie or a flat-out failure
            if (is_tie_or_failure) {
                let threat_roll = 0;
                let threatRollsData = []; // NEW: Array to capture visual dice metadata
                
                for (let n = 0; n < current_challenge.threat; n++) {
                    let r = Math.floor(Math.random() * 2);
                    threat_roll += r;
                    threatRollsData.push({ type: "DH", value: r, isSkillDie: true }); 
                }

                // NEW: Trigger the animation pool using the 'enemy' layout slot (top-right space)
                triggerDiceVisualAnimation(threatRollsData, true);

                // Realized ONLY if threat roll strictly exceeds the player card's caution threshold
                let caution_threshold = CARDS[card][0][0];
                if (threat_roll > caution_threshold) {
                    log(`${activeChallenge.threat_msg || "⚠️ Hrozba sa naplnila!"} \n (KOCKY HROZBY: ${threat_roll} > TVOJA OPATRNOSŤ: ${caution_threshold})`, "danger-msg");
                    threat_realized = true;
                } else {
                    log(`${activeChallenge.threat_avoided_msg || "Vyhol si sa hrozbe."} (KOCKY HROZBY: ${threat_roll} <= TVOJA OPATRNOSŤ: ${caution_threshold})`, "success-msg");
                }
            }

            resetAdrenalineSelection();

            // 3. Process execution route updates based on cleanly updated state flags
            setTimeout(() => {
                inputs_frozen = false;

                // Threat consequences take absolute priority if tripped during a tie/failure
                if (threat_realized) {
                    handleChallengeTransition(activeChallenge.case_threat);
                    if (is_conflict) return; // If threat dragged us to combat, halt further movement
                }

                // Direct success or failure movement splits
                if (success) {
                    handleChallengeTransition(activeChallenge.case_success);
                } else {
                    handleChallengeTransition(activeChallenge.case_failure);
                }
            }, 1800);
        }

        function gameloop(success = true) {
            if (enemy === null) {
                if (success) {
                    runActionPhase();
                } else {
                    // Fail-safe fallback if state engine defaults
                    enemy = "SCOUT";
                    enemy_stress = 0;
                    enemy_escaping = false;
                    is_conflict = true;
                    move = 0;
                    combat_starter = null;
                    runConflictTurn();
                }
            } else {
                runConflictTurn();
            }
        }

        function resolveConflict() {
            //log(`\n-----------------------------------------`, "system-msg");
            //log(`RESOLVING CONFLICT CYCLES`);
            //log(`Player Selected Action: [${player_action[0]}, ${player_action[1]}]`);
            //log(`Enemy Selected Action: [${enemy_action[0]}, ${enemy_action[1]}]`);
            //log(`-----------------------------------------`, "system-msg");

            let enemy_roll = rollDice(enemy_action[1], enemy_action[0] === "A", ENEMY_TYPES[enemy]["skill"], true);
            enemy_roll += enemy_advantage;
            log(`${enemy}: ${enemy_roll} (VÝHODA: +${enemy_advantage}).`, "", true);

            let adrenaline = parseInt(document.getElementById("adrenaline-select").value) || 0;
            let player_roll = rollDice(player_action[1], player_action[0] === "A", skill, false);
            player_roll += (advantage + adrenaline); 
            
            log(`TY: ${player_roll} (VÝHODA: +${advantage}   ADRENALÍN: +${adrenaline} ).`);

            resetAdrenalineSelection();

            // 1. PLAYER ATTACKS (Succeeds or Ties)
            if (player_roll >= enemy_roll && player_action[0] === "A") {
                let enemy_caution = enemy_action[0] === "D" ? CARDS[enemy_action[1]][0][0] : 0;
                let stressDmg = Math.max(0, CARDS[player_action[1]][1][0] + weapon - enemy_caution); 

                if (stressDmg + enemy_stress >= ENEMY_TYPES[enemy]["stress_thresh"]) {
                    log(`\n💥 ${enemy} JE DOLE! Môžeš pokračovať.`, "success-msg", true);
                    
                    inputs_frozen = true;
                    updateUI();

                    setTimeout(() => { 
                        const enemyContainer = document.getElementById("enemy-sprite-container");
                        if (enemyContainer) enemyContainer.style.display = "none";
                        
                        let activeChallenge = CHALLENGES[current_challenge_key];
                        enemy = null; enemy_stress = 0; enemy_escaping = false;
                        enemy_advantage = 0; advantage = 0; move = 0; round += 1;
                        player_action = null; enemy_action = null; is_conflict = false;

                        // --- NOVÉ: Ak existuje odložená udalosť po nepriateľovi, spusti ju ---
                        if (pending_challenge_key) {
                            let nextChallenge = pending_challenge_key;
                            pending_challenge_key = null; 
                            handleChallengeTransition(nextChallenge);
                        } else {
                            handleChallengeTransition(activeChallenge.case_success); 
                        }
                    }, 4000); 
                    return;
                } else {
                    enemy_stress += stressDmg;
                    log(`Zvýšil si protivníkovi stres o ${stressDmg}.`, "success-msg");
                    const enemyContainer = document.getElementById("enemy-sprite-container");
                    if (enemyContainer) {
                        enemyContainer.classList.remove("enemy-hit");
                        void enemyContainer.offsetWidth; 
                        enemyContainer.classList.add("enemy-hit");
                    }
                }
            }

            // 2. ENEMY ATTACKS (Succeeds or Ties)
            if (player_roll <= enemy_roll && enemy_action[0] === "A") {
                let player_caution = 0;
                if (player_action[0] === "D") {
                    player_caution = CARDS[player_action[1]][0][0];
                }
                let stressDmg = CARDS[enemy_action[1]][1][0] + ENEMY_TYPES[enemy]["weapon"] - player_caution;
                stressDmg = Math.max(0, stressDmg); 

                if (stressDmg + stress > stress_thresh) {
                    log(`💀 TVOJ STRES PREKROČIL HODNOTU KOLAPSU. KONIEC HRY.`, "failure-msg");
                    inputs_frozen = true;
                    updateUI();
                    return;
                } else {
                    stress += stressDmg;
                    log(`Stúpol ti stres o: ${stressDmg}.`, "failure-msg");
                }
            }

            // 3. ADVANTAGE DETERMINATION (Updated to reward defender on Attack vs Defend ties)
            
            // Player gets advantage if they win cleanly on Defense, OR if they tie on Defense against an Enemy Attack
            if ((player_roll > enemy_roll && player_action[0] === "D") || 
                (player_roll === enemy_roll && player_action[0] === "D" && enemy_action[0] === "A")) {
                advantage += 1;
                log("Útok ťa zasiahol, ale dostaneš sa pri tom do lepšej pozície a získavaš výhodu +1 do ďalšieho kola.");
            } 
            
            // Enemy gets advantage if they win cleanly on Defense, OR if they tie on Defense against a Player Attack
            if ((player_roll < enemy_roll && enemy_action[0] === "D") || 
                (player_roll === enemy_roll && enemy_action[0] === "D" && player_action[0] === "A")) {
                enemy_advantage += 1;
                log(`🛡️ Nepriateľ uskočil do výhodnejšej pozície! Získava výhodu +1 do ďalšieho kola.`);
            }

            move = 0;
            round += 1;
            player_action = null;
            enemy_action = null;

            setTimeout(() => { gameloop(false); }, 2000);
        }

        function ready() {
            const prompt = document.getElementById("ready-prompt");
            prompt.style.display = "flex";
        }

        document.getElementById("ready-btn").addEventListener("click", function() {
            document.getElementById("ready-prompt").style.display = "none";
            log("Ok, pokračujeme...", "", true);
            
            inputs_frozen = true;
            updateUI();
            
            setTimeout(() => {
                inputs_frozen = false;
                enemyChoice();
            }, 500);
        });

        function runConflictTurn() {
            if (move === 0) {
                if (combat_starter === null) {
                    combat_starter = Math.random() < 0.5 ? "p" : "e";
                } else {
                    combat_starter = (combat_starter === "p") ? "e" : "p";
                }
                
                turn = combat_starter;
                log(`${turn === "p" ? "Začínaš ty." : "Začína " + enemy + "."}`);
            }

            updateUI();

            if (move < 2) {
                if (turn === "e") {
                    inputs_frozen = true;
                    updateUI();
                    if (move == 1) {
                        setTimeout(enemyChoice, 1200);
                    } else {
                        ready();
                    }
                } else {
                    updateUI();
                    setTimeout(() => {
                        log("Si na ťahu. Vyber si kartu a spôsob (ÚTOK/ČIN).", "", true);
                        inputs_frozen = false;
                    }, 3000);
                }
            } else {
                inputs_frozen = true;
                updateUI();
                setTimeout(resolveConflict, 1000);
            }
        }


        function handleConflictInput(actionType, cardCode) {
            if (move === 0) {
                hidecards(player = true);
                const tableFloor = document.querySelector('.gaming-table-floor');
                const existingPools = tableFloor.querySelectorAll('.dice-animation-pool');
                existingPools.forEach(pool => pool.remove());
            }
            // IF a new round is starting and player goes first, slide the old card away
            const playerDisplay = document.getElementById("player-card-display");
            const rotClass = actionType === "D" ? "rotate-player-D" : "rotate-player-A";
                
                // Build card with 'table-card' class to separate from tray behavior
                playerDisplay.innerHTML = `
                    <div class="card-container table-card ${rotClass}">
                        <img src="assets/${cardCode}.png" class="card-img">
                    </div>`;
                
            playerDisplay.classList.add("show");



            player_action = [actionType, cardCode];
            //log(`You chose: [${actionType === "A" ? "Attack" : "Defend"}, Card ${cardCode}]`);
            move += 1;
            turn = "e";
            
            runGameloopCycle();
        }

        function enemyChoice() {
            const container = document.getElementById("enemy-card-container");
            const isCardShowing = container && container.classList.contains("show");

            // IF a new round is starting, enemy goes first, and an old card is visible:
            // Slide it up first, then wait 500ms for the CSS transition before dropping the new one.
            if (move === 0 && isCardShowing) {
                hidecards(player = true);
                const tableFloor = document.querySelector('.gaming-table-floor');
                const existingPools = tableFloor.querySelectorAll('.dice-animation-pool');
                existingPools.forEach(pool => pool.remove());
                setTimeout(proceedWithEnemyChoice, 500);
            } else {
                proceedWithEnemyChoice();
            }
        }

        function proceedWithEnemyChoice() {
            let pa = player_action;
            if (pa) {
                if (pa[0] === "A") {
                    if (CARDS[pa[1]][1][0] + enemy_stress - 3 > ENEMY_TYPES[enemy]["stress_thresh"]) {
                        enemy_action = ["D", "B"];
                    } else if (stress > stress_thresh - 3) {
                        enemy_action = ["D", "B"];
                    } else if (enemy_stress > ENEMY_TYPES[enemy]["stress_thresh"] - 2) {
                        let choice = Math.random() < 0.5 ? "A" : "D";
                        enemy_action = [choice, "O"];
                    } else {
                        let choices = ["O", "R", "S", "B"];
                        let choice = choices[Math.floor(Math.random() * choices.length)];
                        enemy_action = ["A", choice];
                    }
                } else {
                    enemy_action = ["A", "O"]; 
                    let choices = ["O", "R", "S", "B"];
                    for (let c of choices) {
                        if (CARDS[c][1][0] + ENEMY_TYPES[enemy]["weapon"] > CARDS[pa[1]][0][0]) {
                            enemy_action = ["A", c];
                            break;
                        }
                    }
                }
            } else if (enemy_stress === ENEMY_TYPES[enemy]["stress_thresh"]) {
                enemy_action = ["D", "B"];
                enemy_escaping = true;
            } else {
                let choices = ["O", "R", "S", "B"];
                let choice = choices[Math.floor(Math.random() * choices.length)];
                enemy_action = ["A", choice];
            }

            move += 1;
            turn = "p";
            let escapeText = enemy_escaping ? `${enemy} sa snaží ujsť` : "";
            
            if (escapeText) {
                log(`${escapeText} `, "", true);
                inputs_frozen = true;
                updateUI();
                
                setTimeout(() => {
                    inputs_frozen = false;
                    displayEnemyCard(enemy_action[0], enemy_action[1]);
                    runGameloopCycle();
                }, 4000);
            } else {
                displayEnemyCard(enemy_action[0], enemy_action[1]);
                runGameloopCycle();
            }
        }

        function runGameloopCycle() {
            gameloop(false, true);
        }

        function displayEnemyCard(actionType, cardCode) {
            const container = document.getElementById("enemy-card-container");
            if (!container) return;

            // Determine rotation: Opposite of player logic 
            // (If Enemy Defends, they rotate -90 to face player's 90)
            const rotClass = actionType === "D" ? "rotate-enemy-D" : "rotate-enemy-A";

            const bgColors = { "O": "#c62828", "R": "#2e7d32", "S": "#e65100", "B": "#1565c0" };
            const bgColor = bgColors[cardCode] || "#333";

            container.innerHTML = `
                <div class="table-card ${rotClass}">
                    <img src="assets/${cardCode}.png" class="card-img" onerror="this.style.display='none'; this.parentElement.style.background='${bgColor}';">
                </div>
            `;

            void container.offsetWidth; // Reflow
            container.classList.add("show");
        }

        function hidecards(player = false) {
            const container = document.getElementById("enemy-card-container");
            if (container) {
                container.classList.remove("show");
            }
            const playerDisplay = document.getElementById("player-card-display");
            if (playerDisplay && player) {
                playerDisplay.classList.remove("show");
            }
        }


        document.getElementById("flip-cards-btn").addEventListener("click", function() {
            cards_are_flipped = !cards_are_flipped;
            
            const cards = document.querySelectorAll("#card-tray-container .card-container");
            cards.forEach(card => {
                card.classList.toggle("flipped", cards_are_flipped);
                
                // Target elements safely by their native structural order inside the card container
                const firstZone = card.children[0];  // Originally Defend / Top
                const secondZone = card.children[1]; // Originally Attack / Bottom
                
                if (cards_are_flipped) {
                    // Turn the first physical zone into the bottom visual slot (Attack/Red)
                    firstZone.className = "split-zone bottom";
                    firstZone.innerText = "ÚTOK";
                    firstZone.setAttribute("data-action", "A");
                    
                    // Turn the second physical zone into the top visual slot (Defend/Green)
                    secondZone.className = "split-zone top";
                    secondZone.innerText = "ČIN";
                    secondZone.setAttribute("data-action", "D");
                } else {
                    // Revert explicitly to baseline setup
                    firstZone.className = "split-zone top";
                    firstZone.innerText = "ČIN";
                    firstZone.setAttribute("data-action", "D");
                    
                    secondZone.className = "split-zone bottom";
                    secondZone.innerText = "ÚTOK";
                    secondZone.setAttribute("data-action", "A");
                }
            });
        });

        document.getElementById("card-tray-container").addEventListener("click", function(e) {
            if (inputs_frozen) return;

            if (is_conflict) {
                const zone = e.target.closest(".split-zone");
                if (!zone) return;
                const cardContainer = zone.closest(".card-container");
                const cardCode = cardContainer.getAttribute("data-card");
                let actionType = zone.getAttribute("data-action");
                
                // FIXED: Removed the faulty 'if (cards_are_flipped)' inversion logic from here
                
                handleConflictInput(actionType, cardCode);
            } 
            else {
                const cardContainer = e.target.closest(".card-container");
                if (!cardContainer) return;
                const cardCode = cardContainer.getAttribute("data-card");
                
                resolveActionPhase(cardCode);
            }
        });

        // Table Input Management Engine (Updated to update stress immediately)
        document.getElementById("adrenaline-track-row").addEventListener("click", function(e) {
            if (inputs_frozen) return;
            
            const clickedCell = e.target.closest(".ad-node.ad-playable");
            if (!clickedCell) return; // Ignore if user clicks a locked/gray cell
            
            // Get the structural index position of the chosen node (which equals the new stress level)
            const targetStressVal = parseInt(clickedCell.getAttribute("data-idx"));
            const targetAdrenalineVal = clickedCell.getAttribute("data-val");
            
            // Clear prior selection highlights
            document.querySelectorAll(".ad-node").forEach(node => node.classList.remove("ad-selected"));
            
            const currentSelectedValue = document.getElementById("adrenaline-select").value;
            if (currentSelectedValue === targetAdrenalineVal && stress === targetStressVal) {
                // If they click the exact same node again, do nothing or let them click another
                return;
            } else {
                // 1. Immediately update the game state stress variable to this column's value
                stress = targetStressVal;
                
                // 2. Lock in the selected visual highlight state
                clickedCell.classList.add("ad-selected");
                
                // 3. Update hidden input tracker value for the dice rolling engine
                document.getElementById("adrenaline-select").value = targetAdrenalineVal;
                
                log(`Adrenalín použitý! Stres sa ti zvyšuje na ${stress} a získavaš +${targetAdrenalineVal} k ďalšiemu hodu.`);
                
                // 4. Force a UI refresh to immediately shift the red 'S' track indicator to the new position
                updateUI();
            }
        });

        // Init Core
        // Init Core
        handleChallengeTransition(current_challenge_key);
    </script>
</body>
</html>
